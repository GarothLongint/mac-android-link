name: MacLink
options:
  bundleIdPrefix: com.maclink
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15"

packages:
  SwiftProtobuf:
    url: https://github.com/apple/swift-protobuf.git
    from: 1.25.0

targets:
  MacLink:
    type: application
    platform: macOS
    sources:
      - path: MacLink/Sources
    info:
      path: MacLink/Sources/App/Info.plist
      properties:
        CFBundleIdentifier: com.maclink.app
        CFBundleName: MacLink
        CFBundleDisplayName: MacLink
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.1.0"
        LSUIElement: true                        # Menu bar only (no Dock icon)
        NSUserNotificationAlertStyle: alert
        NSUserNotificationsUsageDescription: "MacLink wyświetla powiadomienia z Twojego telefonu Android."
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.maclink.app
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: SwiftProtobuf
        product: SwiftProtobuf
